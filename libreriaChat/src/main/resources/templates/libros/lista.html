<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de libros</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { border: 1px solid #ccc; padding: 0.75rem; text-align: left; }
        .acciones, .paginacion { display: flex; gap: 0.5rem; align-items: center; margin-top: 1rem; flex-wrap: wrap; }
        .activo { font-weight: bold; }
        a, button { padding: 0.5rem 0.75rem; text-decoration: none; cursor: pointer; }
        .mensaje { color: #0a7a2f; margin-top: 1rem; }
    </style>
</head>
<body>
<h1>Libros</h1>

<p th:if="${mensajeExito}" th:text="${mensajeExito}" class="mensaje"></p>

<div class="acciones">
    <a th:href="@{/ui/libros/nuevo}">Nuevo libro</a>
</div>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Titulo</th>
        <th>Autor</th>
        <th>ISBN</th>
        <th>Anio</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="libro : ${librosPage.content}">
        <td th:text="${libro.id}"></td>
        <td th:text="${libro.titulo}"></td>
        <td th:text="${libro.autor}"></td>
        <td th:text="${libro.isbn}"></td>
        <td th:text="${libro.fechaPublicacion}"></td>
    </tr>
    <tr th:if="${librosPage.empty}">
        <td colspan="5">No hay libros registrados.</td>
    </tr>
    </tbody>
</table>

<div class="paginacion">
    <a th:if="${!librosPage.first}" th:href="@{/ui/libros(page=${paginaActual - 1})}">Anterior</a>
    <span th:if="${librosPage.first}">Anterior</span>

    <a th:each="numeroPagina : ${paginas}"
       th:href="@{/ui/libros(page=${numeroPagina})}"
       th:text="${numeroPagina + 1}"
       th:classappend="${numeroPagina == paginaActual} ? 'activo' : ''"></a>

    <a th:if="${!librosPage.last}" th:href="@{/ui/libros(page=${paginaActual + 1})}">Siguiente</a>
    <span th:if="${librosPage.last}">Siguiente</span>
</div>
</body>
</html>
