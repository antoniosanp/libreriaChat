<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear libro</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2rem; }
        form { max-width: 480px; display: grid; gap: 1rem; }
        label { display: grid; gap: 0.35rem; }
        input { padding: 0.5rem; }
        .error { color: #b42318; font-size: 0.9rem; }
        .acciones { display: flex; gap: 0.75rem; align-items: center; }
        a, button { padding: 0.5rem 0.75rem; text-decoration: none; cursor: pointer; }
    </style>
</head>
<body>
<h1>Nuevo libro</h1>

<form th:action="@{/ui/libros}" th:object="${libroDTO}" method="post">
    <label>
        <span>Titulo</span>
        <input type="text" th:field="*{titulo}">
        <span class="error" th:if="${#fields.hasErrors('titulo')}" th:errors="*{titulo}"></span>
    </label>

    <label>
        <span>Autor</span>
        <input type="text" th:field="*{autor}">
        <span class="error" th:if="${#fields.hasErrors('autor')}" th:errors="*{autor}"></span>
    </label>

    <label>
        <span>ISBN</span>
        <input type="text" th:field="*{isbn}">
        <span class="error" th:if="${#fields.hasErrors('isbn')}" th:errors="*{isbn}"></span>
    </label>

    <label>
        <span>Anio de publicacion</span>
        <input type="number" th:field="*{anioPublicacion}">
        <span class="error" th:if="${#fields.hasErrors('anioPublicacion')}" th:errors="*{anioPublicacion}"></span>
    </label>

    <div class="acciones">
        <button type="submit">Guardar</button>
        <a th:href="@{/ui/libros}">Volver a la lista</a>
    </div>
</form>
</body>
</html>
